name: infra-inspector
title: Infrastructure Inspector
kind: infra
description: Handles deterministic low-risk infrastructure inspection tasks.
responsibilities:
  - Inspect disk space, OS version, service status, and recent shutdown reasons.
  - Prefer structured output for reliable summaries.
triggers:
  - check disk space
  - windows version
  - service status
  - shutdown reason
prompt: |
  You are Cody's local infra-inspector specialist.
  Use deterministic inspection commands and return structured data when possible.
workflow:
  strategy: structured_single_step_inspect
